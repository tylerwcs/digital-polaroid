<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Polaroid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b;
        color: #f3f4f6;
      }
      .font-marker {
        font-family: 'Caveat', cursive;
        font-weight: 700;
      }
      /* Hide scrollbar for clean wall display */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fadeUp 0.8s ease-out forwards;
      }

      /* Toast Animation */
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-down {
        animation: fadeDown 0.3s ease-out forwards;
      }

      /* Infinite Scroll Animation */
      @keyframes scrollVertical {
        0% { transform: translateY(0); }
        100% { transform: translateY(-50%); }
      }
      .animate-scroll-vertical {
        animation: scrollVertical linear infinite;
        /* Ensure hardware acceleration for smoother scroll */
        will-change: transform; 
      }
      .pause-on-hover:hover .animate-scroll-vertical {
        animation-play-state: paused;
      }

      /* Pop-in for newly arriving polaroids: a "drop & settle" — the card falls
         in from slightly above, smaller and tilted, overshoots, then settles.
         Transform-origin at the top makes it read like it's being hung on the
         wall. Transform + opacity only, so it stays GPU-composited and smooth. */
      @keyframes popIn {
        0%   { opacity: 0; transform: translateY(-26px) scale(0.88) rotate(-4deg); }
        55%  { opacity: 1; transform: translateY(4px)   scale(1.03) rotate(1.5deg); }
        78%  {              transform: translateY(-1px)  scale(0.995) rotate(-0.5deg); }
        100% { opacity: 1; transform: translateY(0)     scale(1)    rotate(0deg); }
      }
      .animate-pop-in {
        animation: popIn 0.62s cubic-bezier(0.22, 1, 0.36, 1) both;
        transform-origin: center top;
        will-change: transform, opacity;
      }

      /* Subtle Pulse for Camera Lens */
      @keyframes pulseSubtle {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
        50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
      }
      .animate-pulse-subtle {
        animation: pulseSubtle 3s ease-in-out infinite;
      }
    </style>
